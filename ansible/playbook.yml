---
# ─────────────────────────────────────────────────────────────────────────────
# 360 Feedback Django — Deploy Playbook
#
# Usage (from project root):
#   ansible-playbook -i ansible/inventory.ini ansible/playbook.yml
#
# What it does:
#   1. Rsyncs this repo from the machine running Ansible → server (server need not access GitHub)
#   2. Rebuilds and restarts Docker containers
#   3. Verifies health
#
# Run from a full git checkout: git pull && ./deploy.sh
# ─────────────────────────────────────────────────────────────────────────────

- name: Deploy 360 Feedback Django
  hosts: django_servers
  vars:
    app_path: /opt/360-django
    google_client_id: "581506113726-h32th7jgkc9s6b1l2e5t8mb39vd0o4cn.apps.googleusercontent.com"

  tasks:

    # Push code from laptop/CI → server (HTTPS git on server fails without GitHub credentials)
    - name: Sync codebase to server (rsync over SSH)
      ansible.builtin.shell: |
        set -e
        ROOT="$(cd "{{ playbook_dir }}/.." && pwd)"
        rsync -az \
          --exclude='.git/' \
          --exclude='frontend/node_modules/' \
          --exclude='backend/venv/' \
          --exclude='.venv-deploy/' \
          --exclude='backend/.env.docker' \
          --exclude='backend/.env' \
          --exclude='backend/.env.local' \
          --exclude='backend/media/' \
          --exclude='**/__pycache__/' \
          --exclude='*.pyc' \
          --exclude='frontend/dist/' \
          --exclude='360_React_Nodejs/' \
          -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new" \
          "$ROOT/" "{{ ansible_user }}@{{ ansible_host }}:{{ app_path }}/"
      delegate_to: localhost
      become: false

    - name: Verify .env.docker exists (must be on server manually)
      stat:
        path: "{{ app_path }}/backend/.env.docker"
      register: env_file
      failed_when: not env_file.stat.exists
      ignore_errors: no

    - name: Build and restart containers
      shell: |
        cd {{ app_path }}
        VITE_GOOGLE_CLIENT_ID={{ google_client_id }} docker compose up -d --build
      register: compose_output

    - name: Show compose output
      debug:
        var: compose_output.stdout_lines

    - name: Wait for backend to be healthy
      shell: docker inspect --format='{{ "{{.State.Health.Status}}" }}' 360-django-db-1
      register: db_health
      until: db_health.stdout == "healthy"
      retries: 10
      delay: 5

    - name: Seed users and templates (ensures Simple 360° Review template exists)
      shell: |
        cd {{ app_path }}
        docker compose exec -T backend python manage.py seed_users
      register: seed_result
      changed_when: false

    - name: Show running containers
      shell: docker ps --format "table {{ '{{.Names}}' }}\t{{ '{{.Status}}' }}\t{{ '{{.Ports}}' }}" | grep gamyam360chat
      register: containers

    - name: Print container status
      debug:
        var: containers.stdout_lines

    - name: Verify frontend is responding
      uri:
        url: "http://localhost:6000/"
        status_code: 200
      register: frontend_check

    - name: Verify backend API is responding
      uri:
        url: "http://localhost:8001/api/v1/auth/login/"
        method: POST
        body_format: json
        body:
          email: "admin@gamyam.com"
          password: "Admin@123"
        status_code: 200
      register: backend_check

    - name: Deploy complete
      debug:
        msg:
          - "✅ Deploy successful!"
          - "Frontend: http://164.52.215.113:6000/"
          - "Backend:  http://164.52.215.113:8001/"
